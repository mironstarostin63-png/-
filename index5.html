<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP МЕНЮ</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg: #0a0a0a; --card: #141414; }
        body { 
            margin: 0; padding: 0; background: var(--bg); color: white;
            font-family: 'Playfair Display', serif; display: flex; justify-content: center;
        }
        .app-container {
            width: 100%; max-width: 600px; padding: 50px 20px;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            min-height: 100vh; position: relative; box-sizing: border-box;
        }
        .main-title {
            font-family: 'Cinzel', serif; font-size: 2.5rem; text-align: center;
            color: var(--gold); letter-spacing: 12px; margin-bottom: 60px;
        }
        .dish-card {
            background: var(--card); border: 1px solid rgba(197, 160, 89, 0.3);
            margin-bottom: 25px; transition: 0.4s; overflow: hidden;
        }
        .dish-header {
            padding: 30px; cursor: pointer; display: flex; justify-content: center;
            font-family: 'Cinzel', serif; font-size: 1.4rem; color: var(--gold);
            letter-spacing: 5px; text-transform: uppercase;
        }
        .sub-categories {
            max-height: 0; opacity: 0; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            background: #0d0d0d;
        }
        .dish-card.active .sub-categories { max-height: 5000px; opacity: 1; padding-bottom: 20px; }
        .sub-item {
            padding: 25px 30px; border-top: 1px solid rgba(197, 160, 89, 0.15);
        }
        .sub-item-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
        }
        .sub-name { font-size: 1.2rem; color: #fff; font-weight: bold; letter-spacing: 1px; }
        .recipe-text {
            font-size: 0.95rem; color: #999; font-style: italic; line-height: 1.6;
            display: block; margin-top: 5px; text-align: justify;
        }
        .gold-check {
            width: 28px; height: 28px; border: 2px solid var(--gold);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .selected .gold-check { background: var(--gold); box-shadow: 0 0 20px var(--gold); }
        .gold-check::after { content: '✓'; color: black; display: none; font-weight: bold; font-size: 1.2rem; }
        .selected .gold-check::after { display: block; }
        
        .order-btn {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 450px; background: var(--gold); color: black;
            border: none; padding: 22px; font-family: 'Cinzel'; font-weight: bold;
            letter-spacing: 5px; cursor: pointer; display: none; z-index: 1000;
        }
        .call-staff {
            text-align: center; margin-top: 60px; color: #555; font-size: 0.8rem;
            letter-spacing: 4px; text-transform: uppercase; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1 class="main-title">VIP МЕНЮ</h1>
    <div id="menu-list"></div>
    <div class="call-staff" onclick="call()">Вызвать персонал</div>
</div>

<button id="submitBtn" class="order-btn" onclick="send()">Отправить заказ</button>

<script>
    emailjs.init("HnFVx9m2zPmPYKWiO");

    const menuData = [
        { name: "Шакшука", items: [
            {n: "Классическая", r: "Рецепт: Три яйца, томленые в густом соусе из спелых томатов, болгарского перца, лука и чеснока с добавлением зиры и копченой паприки."},
            {n: "С зеленью", r: "Рецепт: База из шпината, молодого петрушки и кинзы. Подается со свежим домашним сыром, кедровыми орешками и оливковым маслом."},
            {n: "С чеддером", r: "Рецепт: Пряная томатная основа, запеченная под плотным слоем выдержанного чеддера до состояния тягучей золотистой корочки."}
        ]},
        { name: "Паста", items: [
            {n: "Карбонара", r: "Рецепт: Спагетти из твердых сортов пшеницы, обжаренная свиная щековина гуанчиале, желтки и пекорино романо. Готовится без сливок."},
            {n: "Сливочно-томатная", r: "Рецепт: Итальянская паста в шелковистом соусе из фермерских сливок, вяленых томатов, свежего базилика и молодого чеснока."},
            {n: "С сыром", r: "Рецепт: Эмульсия из пяти видов благородных сыров (пармезан, чеддер, моцарелла, дор-блю, маасдам), расплавленных в густых сливках."}
        ]},
        { name: "Хлебцы и Гренки", items: [
            {n: "Ржаные хлебцы", r: "Производство: Авторская ржаная закваска, 24 часа созревания. Выпекаются на каменном поду. Подаются с взбитым сливочным маслом."},
            {n: "Чесночные гренки", r: "Рецепт: Ломтики бородинского хлеба, обжаренные до хруста в чесночном масле с добавлением крупной морской соли и укропа."},
            {n: "Сырные гренки", r: "Рецепт: Хрустящий пшеничный багет, запеченный под корочкой из тертого пармезана с прованскими травами."}
        ]},
        { name: "Салаты", items: [
            {n: "Цезарь", r: "Рецепт: Листья салата Романо, нежное филе на гриле, слайсы пармезана и авторский соус на основе анчоусов и оливкового масла."},
            {n: "С помидорами", r: "Рецепт: Сочные грунтовые томаты, красный лук, базилик и масло первого отжима с капелькой бальзамического крема."},
            {n: "Айсберг", r: "Рецепт: Хрустящие листья айсберга, свежий огурец, заправка из сока лайма и кунжутное семя для текстуры."}
        ]},
        { name: "Чипсы", items: [
            {n: "С паприкой", r: "Производство: Тончайшая нарезка картофеля сорта Инноватор, обжарка в масле и посыпка натуральной копченой паприкой."},
            {n: "С солью", r: "Производство: Классические домашние чипсы Artisan, подчеркнутые кристаллами чистой гималайской розовой соли."}
        ]},
        { name: "Чай", items: [
            {n: "Облепиховый", r: "Рецепт: Свежие ягоды облепихи, корень имбиря, цветочный мед и палочка цейлонской корицы."},
            {n: "Ромашковый", r: "Рецепт: Цельные цветки аптечной ромашки высшей категории. Успокаивает и нормализует сон."},
            {n: "Успокаивающий", r: "Рецепт: Фитосбор из мелиссы, лаванды и пустырника для глубокой релаксации организма."},
            {n: "Желудочный", r: "Рецепт: Лечебный сбор (мята, семена льна, календула) для улучшения пищеварения и легкости."},
            {n: "Печеночный", r: "Рецепт: Детокс-сбор из расторопши, плодов шиповника и кукурузных рылец."}
        ]},
        { name: "Десерты", items: [
            {n: "Банан", r: "Производство: Экваториальный банан в карамельной глазури из тростникового сахара. Подается с мятой."},
            {n: "Шоколад", r: "Производство: Плитка темного бельгийского шоколада 72%. Только какао-масло и бобы сорта Криолло."},
            {n: "Шоколадное мороженое", r: "Рецепт: Сливочный пломбир с высоким содержанием темного шоколада и шоколадной крошкой внутри."},
            {n: "Bubble Gum мороженое", r: "Рецепт: Авторское мороженое со вкусом классической жевательной резинки и натуральными экстрактами ягод."},
            {n: "Ванильное мороженое", r: "Рецепт: Нежный сливочный десерт с семенами мадагаскарской ванили. Классика в лучшем исполнении."}
        ]}
    ];

    let cart = new Set();
    const list = document.getElementById('menu-list');

    menuData.forEach(dish => {
        const card = document.createElement('div');
        card.className = 'dish-card';
        card.innerHTML = `
            <div class="dish-header" onclick="this.parentElement.classList.toggle('active')">${dish.name}</div>
            <div class="sub-categories">
                ${dish.items.map(item => `
                    <div class="sub-item">
                        <div class="sub-item-header">
                            <span class="sub-name">${item.n}</span>
                            <div class="gold-check" onclick="toggle('${item.n}', this)"></div>
                        </div>
                        <span class="recipe-text">${item.r}</span>
                    </div>
                `).join('')}
            </div>
        `;
        list.appendChild(card);
    });

    function toggle(name, el) {
        const parent = el.closest('.sub-item');
        parent.classList.toggle('selected');
        cart.has(name) ? cart.delete(name) : cart.add(name);
        document.getElementById('submitBtn').style.display = cart.size > 0 ? 'block' : 'none';
    }

    function send() {
        emailjs.send("service_brsik8k", "template_vrunvtb", {
            title: "VIP ЗАКАЗ",
            message: Array.from(cart).join(", ")
        }).then(() => {
            alert("Ваш заказ отправлен!");
            location.reload();
        });
    }

    function call() {
        emailjs.send("service_brsik8k", "template_vrunvtb", {
            title: "ВЫЗОВ",
            message: "Срочный вызов персонала к VIP столу"
        }).then(() => alert("Персонал уведомлен."));
    }
</script>
</body>
</html>
